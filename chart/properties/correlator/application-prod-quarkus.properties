# Kafka configuration
camel.component.kafka.brokers=${KAFKA_BROKERS:kafka:9092}
camel.component.kafka.security-protocol=PLAINTEXT
camel.kafka.topic.logs=otlp_logs
camel.kafka.topic.spans=otlp_spans

# Infinispan configuration for OpenShift
camel.component.infinispan.hosts=${INFINISPAN_HOSTS:infinispan:11222}
camel.component.infinispan.username=${DATAGRID_USERNAME}
camel.component.infinispan.password=${DATAGRID_PASSWORD}
camel.component.infinispan.sasl-mechanism=DIGEST-MD5
camel.component.infinispan.security-realm=default
camel.component.infinispan.security-server-name=infinispan
camel.component.infinispan.secure=true

# Artemis JMS configuration for OpenShift
camel.beans.artemisCF = #class:org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory
camel.beans.artemisCF.brokerURL = ${ARTEMIS_BROKER_URL:tcp://artemis:61616}
camel.beans.artemisCF.user = ${AMQ_USERNAME}
camel.beans.artemisCF.password = ${AMQ_PASSWORD}
camel.beans.poolCF = #class:org.messaginghub.pooled.jms.JmsPoolConnectionFactory
camel.beans.poolCF.connectionFactory = #bean:artemisCF
camel.beans.poolCF.maxSessionsPerConnection = 500
camel.beans.poolCF.connectionIdleTimeout = 20000
camel.component.jms.connection-factory = #bean:poolCF
camel.jms.queue.error-logs=error-logs
camel.jms.queue.ai-prompts=ai-prompts
camel.jms.queue.ai-prompts-read=ai-prompts-read

# Camel configuration
camel.main.name=correlator

# Disable standalone Camel metrics/management (not compatible with Quarkus)
camel.metrics.enabled=false
camel.management.enabled=false
camel.management.metricsEnabled=false

# Quarkus Infinispan client
quarkus.infinispan-client.hosts=${INFINISPAN_HOSTS:infinispan:11222}
quarkus.infinispan-client.username=${DATAGRID_USERNAME}
quarkus.infinispan-client.password=${DATAGRID_PASSWORD}
quarkus.infinispan-client.sasl-mechanism=DIGEST-MD5
