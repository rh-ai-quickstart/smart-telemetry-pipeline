# Storage configuration
analyzer.storage.root=/tmp/analyzer-store

# JMS Queue configuration
camel.jms.queue.analysis-result=analysis-result
camel.jms.queue.error-logs-interactive=error-logs-interactive
camel.jms.queue.ai-prompts=ai-prompts
camel.jms.queue.ai-prompts-read=ai-prompts-read

# Artemis JMS configuration for OpenShift
camel.beans.artemisCF = #class:org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory
camel.beans.artemisCF.brokerURL = ${ARTEMIS_BROKER_URL:tcp://artemis:61616}
camel.beans.artemisCF.user = ${AMQ_USERNAME}
camel.beans.artemisCF.password = ${AMQ_PASSWORD}
camel.beans.poolCF = #class:org.messaginghub.pooled.jms.JmsPoolConnectionFactory
camel.beans.poolCF.connectionFactory = #bean:artemisCF
camel.beans.poolCF.maxSessionsPerConnection = 500
camel.beans.poolCF.connectionIdleTimeout = 20000
camel.component.jms.connection-factory = #bean:poolCF

# REST configuration
camel.rest.component=platform-http
camel.rest.binding-mode=off

# Camel configuration
camel.main.name=ui-console

quarkus.http.enable-compression=true

# Disable standalone Camel metrics/management (not compatible with Quarkus)
camel.metrics.enabled=false
camel.management.enabled=false
camel.management.metricsEnabled=false

# Infinispan stats (cache entry counts)
infra.infinispan.host=${INFINISPAN_HOSTS:infinispan:11222}
infra.infinispan.user=${DATAGRID_USERNAME}
infra.infinispan.password=${DATAGRID_PASSWORD}

# Prometheus proxy endpoints
infra.correlator.metrics.url=correlator:9876/observe/metrics
infra.analyzer.metrics.url=analyzer:9876/observe/metrics
infra.ui.metrics.url=ui-console:9876/observe/metrics
infra.analyzer.state.url=analyzer:8080/api/analyzer/state
