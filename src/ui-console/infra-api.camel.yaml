# Metrics proxy API - proxies Prometheus scrape endpoints from Camel services
# and analyzer state API
- rest:
    path: /api/metrics
    get:
      - id: get-correlator-metrics
        path: /correlator
        to: direct:correlator-metrics
      - id: get-analyzer-metrics
        path: /analyzer
        to: direct:analyzer-metrics
      - id: get-ui-metrics
        path: /ui
        to: direct:ui-metrics

- rest:
    path: /api/analyzer
    get:
      - id: proxy-analyzer-state
        path: /state
        produces: application/json
        to: direct:proxy-analyzer-state

- rest:
    path: /api/infra
    get:
      - id: get-cache-stats
        path: /cache-stats
        produces: application/json
        to: direct:cache-stats
      - id: get-queue-stats
        path: /queue-stats
        produces: application/json
        to: direct:queue-stats

# Proxy correlator Prometheus metrics
- route:
    id: route-correlator-metrics
    from:
      uri: direct:correlator-metrics
      steps:
        - doTry:
            steps:
              - removeHeaders:
                  pattern: "*"
              - setHeader:
                  name: CamelHttpMethod
                  constant: GET
              - toD:
                  uri: "http://{{infra.correlator.metrics.url}}"
              - convertBodyTo:
                  type: String
              - setHeader:
                  name: Content-Type
                  constant: "text/plain; version=0.0.4; charset=utf-8"
            doCatch:
              - exception:
                  - java.lang.Exception
                steps:
                  - setHeader:
                      name: CamelHttpResponseCode
                      constant: 503
                  - setBody:
                      constant: "# Correlator metrics unavailable"
                  - setHeader:
                      name: Content-Type
                      constant: "text/plain"

# Proxy analyzer Prometheus metrics
- route:
    id: route-analyzer-metrics
    from:
      uri: direct:analyzer-metrics
      steps:
        - doTry:
            steps:
              - removeHeaders:
                  pattern: "*"
              - setHeader:
                  name: CamelHttpMethod
                  constant: GET
              - toD:
                  uri: "http://{{infra.analyzer.metrics.url}}"
              - convertBodyTo:
                  type: String
              - setHeader:
                  name: Content-Type
                  constant: "text/plain; version=0.0.4; charset=utf-8"
            doCatch:
              - exception:
                  - java.lang.Exception
                steps:
                  - setHeader:
                      name: CamelHttpResponseCode
                      constant: 503
                  - setBody:
                      constant: "# Analyzer metrics unavailable"
                  - setHeader:
                      name: Content-Type
                      constant: "text/plain"

# Proxy UI Console's own Prometheus metrics
- route:
    id: route-ui-metrics
    from:
      uri: direct:ui-metrics
      steps:
        - doTry:
            steps:
              - removeHeaders:
                  pattern: "*"
              - setHeader:
                  name: CamelHttpMethod
                  constant: GET
              - toD:
                  uri: "http://{{infra.ui.metrics.url}}"
              - convertBodyTo:
