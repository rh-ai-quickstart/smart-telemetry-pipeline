# Analyzes error logs by retrieving OpenTelemetry events from Infinispan
# and sending them to an LLM for root cause analysis and recommendations
- routeConfiguration:
    id: state-configuration
    interceptFrom:
      - interceptFrom:
          id: interceptFrom-active-state
          steps:
            - setVariable:
                description: Extract trace ID
                name: traceId
                simple: ${body}
            - setHeader:
                description: Set file name
                name: CamelFileName
                constant: analyzer-state.json
            - setBody:
                description: Set active state
                simple: >-
                  {"active":true,"traceId":"${variable.traceId}","startedAtEpochMs":${messageTimestamp},"updatedAtEpochMs":${messageTimestamp}}
            - to:
                description: Write state file
                uri: "file:/tmp/smart-log-analyzer"
            - setBody:
                description: Restore original body
                simple: ${variable.traceId}
    onCompletion:
      - onCompletion:
          id: onCompletion-inactive-state
          steps:
            - setHeader:
                description: Set file name
                name: CamelFileName
                constant: analyzer-state.json
            - setBody:
                description: Set inactive state
                simple: >-
                  {"active":false,"traceId":"${variable.traceId}","startedAtEpochMs":0,"updatedAtEpochMs":${messageTimestamp}}
            - to:
                description: Write state file
                uri: "file:/tmp/smart-log-analyzer"

- route:
    id: error-log-analyzer
    routeConfigurationId: state-configuration
    description: Analyze error logs
    from:
      uri: jms:{{camel.jms.queue.error-logs}}
      steps:
        - setVariable:
            description: Extract trace ID
            name: traceId
            simple: ${body}
        - setVariable:
            description: Set operation header
            name: opHeader
            constant: ""
        - setVariable:
            description: Set log suffix
            name: logSuffix
            constant: ""
        - log:
            description: Log analysis start
            loggingLevel: INFO
            message: Received ERROR log for analysis
        - log:
            description: Log retrieval start
            loggingLevel: INFO
            message: "Retrieving all events for traceId: ${variable.traceId}"
        - setHeader:
            description: Set cache key
            name: CamelInfinispanKey
            simple: otel-${variable.traceId}
        - to:
            description: Get trace events
            uri: infinispan:events
            parameters:
              operation: GET
        - choice:
            description: Check if events found
            when:
              - simple: "${body} != null && ${body} != ''"
                steps:
                  - setVariable:
                      description: Count trace events
                      name: recordCount
                      jq:
                        expression: length
                        resultType: java.lang.String
                  - log:
                      description: Log record count
                      message: "Sending ${variable.recordCount} records to LLM for analysis"
                  - setVariable:
                      description: Save events JSON
                      name: eventsJson
                      simple: ${body}
                  - to:
                      description: Proceed to analysis
                      uri: direct:run-analysis
            otherwise:
              steps:
                - to:
                    description: Increment analyses not-found counter
                    uri: "micrometer:counter:analyzer.analyses.notfound"
                - log:
                    description: Log no events
                    loggingLevel: WARN
                    message: "No events found in Infinispan for traceId: ${variable.traceId}"
- route:
    id: run-analysis
    description: Run LLM analysis
    from:
      uri: direct:run-analysis
      steps:
        - setHeader:
            description: Set per-trace prompt cache key
            name: CamelInfinispanKey
            simple: ${variable.traceId}-prompt-msg
        - to:
            description: Get per-trace prompt from cache
            uri: infinispan:ai-messages
            parameters:
              operation: GET
        - convertBodyTo:
            description: Convert prompt to string
            type: String
        - choice:
            description: Fallback to default prompt if per-trace not found
            when:
              - simple: "${body} == null || ${body} == ''"
                steps:
                  - setHeader:
                      description: Set default prompt cache key
                      name: CamelInfinispanKey
                      constant: prompt-msg
                  - to:
                      description: Get default prompt from cache
                      uri: infinispan:ai-messages
                      parameters:
                        operation: GET
                  - convertBodyTo:
                      description: Convert prompt to string
                      type: String
        - setBody:
            description: Create prompt body
            simple: "${body}\n\nTrace ID: ${variable.traceId}\n\nEvents (spans and logs sorted by timestamp):\n${variable.eventsJson}"
        - setVariable:
            description: Save prompt body
            name: promptBody
            simple: ${body}
        - choice:
            description: Set system prompt based on operation type
            when:
              - simple: "${variable.opHeader} == 'interactive'"
                steps:
                  - setHeader:
                      description: Set empty system prompt
                      name: CamelOpenAISystemMessage
                      constant: ""
            otherwise:
              steps:
                - setHeader:
                    description: Set system cache key
                    name: CamelInfinispanKey
                    constant: system-msg
                - to:
                    description: Get system prompt from cache
                    uri: infinispan:ai-messages
                    parameters:
                      operation: GET
                - convertBodyTo:
                    description: Convert system prompt to string
                    type: String
                - setHeader:
                    description: Set system prompt
                    name: CamelOpenAISystemMessage
                    simple: ${body}
        - setBody:
            description: Restore prompt body
            simple: ${variable.promptBody}
        - to:
            description: Start LLM timer
            uri: "micrometer:timer:analyzer.llm.duration?action=start"
        - to:
            description: Call OpenAI LLM
            uri: openai:chat-completion
        - to:
            description: Stop LLM timer
            uri: "micrometer:timer:analyzer.llm.duration?action=stop"
        - to:
            description: Increment analyses completed counter
            uri: "micrometer:counter:analyzer.analyses.completed"
        - setHeader:
            description: Set trace ID
            name: traceId
            simple: "${variable.traceId}"
        - choice:
            description: Forward op header if interactive
            when:
              - simple: "${variable.opHeader} == 'interactive'"
                steps:
                  - setHeader:
                      description: Set op header
                      name: op
                      constant: interactive
        - to:
            description: Send analysis result
            uri: jms:{{camel.jms.queue.analysis-result}}
- route:
    id: interactive-log-analyzer
    description: Analyze interactive requests
    from:
      uri: jms:{{camel.jms.queue.error-logs-interactive}}
      steps:
        - log:
            description: Log interactive analysis start
            loggingLevel: INFO
            message: "Received interactive analysis request"
        - setVariable:
            description: Extract trace ID
            name: traceId
            simple: ${body}
        - setVariable:
            description: Set operation header
            name: opHeader
            constant: interactive
        - setVariable:
            description: Set log suffix
            name: logSuffix
            constant: " [interactive]"
        - log:
            description: Log retrieval start
            loggingLevel: INFO
            message: "Retrieving all events for traceId: ${variable.traceId} [interactive]"
        - setHeader:
            description: Set cache key
            name: CamelInfinispanKey
            simple: otel-${variable.traceId}
        - to:
            description: Get trace events
            uri: infinispan:events
            parameters:
              operation: GET
        - choice:
            description: Check if events found
            when:
              - simple: "${body} != null && ${body} != ''"
                steps:
                  - setVariable:
                      description: Save events JSON
                      name: eventsJson
                      simple: ${body}
            otherwise:
              steps:
                - log:
                    description: Log no events
                    message: "No events in Infinispan for traceId ${variable.traceId}, proceeding with prompt only [interactive]"
                - setVariable:
                    description: Set empty events
                    name: eventsJson
                    constant: "[]"
        - to:
            description: Proceed to analysis
            uri: direct:run-analysis
