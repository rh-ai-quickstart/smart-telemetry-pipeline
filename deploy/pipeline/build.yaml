apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL
      default: "https://github.com/mcarlett/smart-telemetry-pipeline.git"
    - name: repo-revision
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: app-path
      type: string
      description: Path within the repository to the Camel application
      default: correlator
    - name: app-name
      type: string
      description: Application name (used for the container image)
      default: correlator
    - name: namespace
      type: string
      description: Target namespace for the container image
      default: slog-analyzer
    - name: camel-image
      type: string
      description: Image containing the Camel CLI for export
      default: "quay.io/mcarlett/camel-launcher:4.20.0"
    - name: gav
      type: string
      description: Maven groupId:artifactId:version for the exported project
      default: "com.example:correlator:1.0.0"
    - name: runtime-version
      type: string
      description: "Quarkus version. If empty, uses the default from camel export"
      default: ""
    - name: deps
      type: string
      description: "Comma-separated list of additional dependencies to add during camel export (e.g. camel-observability-services)"
      default: "camel-direct,camel-observability-services,mvn:org.apache.camel.quarkus:camel-quarkus-platform-http,mvn:org.apache.activemq:artemis-jms-client:2.44.0,mvn:org.messaginghub:pooled-jms:3.2.2"

  workspaces:
    - name: shared-workspace
      description: Shared workspace for source code and build artifacts

  tasks:
    # Step 0: Initialize workspace permissions
    - name: init-workspace
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 1: Clone the repository
    - name: git-clone
      runAfter:
        - init-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.repo-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: repo
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 2: Fix workspace permissions after git-clone
    - name: fix-workspace
      runAfter:
        - git-clone
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 3: Export Camel application to Quarkus
    - name: camel-export
      runAfter:
        - fix-workspace
      taskRef:
        name: camel-export
      params:
        - name: app-path
          value: repo/$(params.app-path)
        - name: camel-image
          value: $(params.camel-image)
        - name: gav
          value: $(params.gav)
        - name: runtime-version
          value: $(params.runtime-version)
        - name: deps
          value: $(params.deps)
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 4: Build application with Maven
    - name: maven-build
      runAfter:
        - camel-export
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: maven-goals
            image: registry.access.redhat.com/ubi9/openjdk-21:latest
            workingDir: $(workspaces.source.path)/export
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              ./mvnw clean package
            securityContext:
              runAsUser: 0

    # Step 6: Write Dockerfile from ConfigMap to workspace
    - name: prepare-dockerfile
      runAfter:
        - maven-build
      taskRef:
        name: prepare-dockerfile
      params:
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 6: Build container image with Buildah
    - name: build-image
      runAfter:
        - prepare-dockerfile
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/$(params.namespace)/$(params.app-name):latest
        - name: DOCKERFILE
          value: src/main/docker/Dockerfile.jvm
        - name: CONTEXT
          value: .
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: export
